<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <link rel="stylesheet" href="shared.css">
    <title>Yahtzee Dice</title>
    <style>
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 1.6vmin, 20px);
            width: min(94vw, 700px);
        }

        .die {
            aspect-ratio: 1 / 1;
            background: var(--die);
            border: 2px solid var(--die-border);
            border-radius: clamp(6px, 1vmin, 14px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 10px var(--die-shadow);
            position: relative;
            cursor: pointer;
        }

        .die.kept {
            background: var(--die-kept);
        }

        .number {
            font-size: clamp(30px, 8vmin, 90px);
            font-weight: bold;
            color: var(--ink);
            line-height: 1;
            user-select: none;
        }

        /* ---- Setup panel ---- */
        .setup-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: space-between;
        }

        .setup-row label {
            color: var(--ink);
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        .player-names {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .player-names input {
            width: 100%;
        }

        /* ---- Score card ---- */
        .card-wrap {
            width: min(96vw, 900px);
            overflow-x: auto;
        }

        table.scorecard {
            border-collapse: collapse;
            width: 100%;
            color: var(--ink);
        }

        table.scorecard th,
        table.scorecard td {
            border: 1px solid var(--die-border);
            padding: clamp(4px, 1vmin, 10px);
            text-align: center;
            font-size: clamp(11px, 1.6vmin, 16px);
            white-space: nowrap;
        }

        table.scorecard th.category,
        table.scorecard td.category {
            text-align: left;
            font-weight: bold;
            background: var(--die);
        }

        table.scorecard th {
            background: var(--die);
            letter-spacing: 0.04em;
        }

        table.scorecard th.active-player {
            color: var(--accent);
        }

        table.scorecard td.score-cell {
            cursor: default;
            background: var(--bg);
        }

        table.scorecard td.score-cell.filled {
            font-weight: bold;
        }

        table.scorecard td.score-cell.pickable {
            cursor: pointer;
            color: var(--accent);
            opacity: 0.75;
            background: var(--die-kept);
        }

        table.scorecard td.score-cell.pickable:hover {
            opacity: 1;
        }

        table.scorecard tr.subtotal td,
        table.scorecard tr.total td {
            background: var(--die-kept);
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="scrollable">

    <div class="button-bar">
        <div class="left">
            <a href="index.html"><button>Home</button></a>
        </div>
        <div class="right">
            <button id="newGameBtn" class="hidden">New Game</button>
        </div>
    </div>

    <!-- Player setup -->
    <div class="setup" id="setup">
        <div class="status">Set Up Players</div>
        <div class="setup-row">
            <label for="playerCount">Number of Players</label>
            <input type="number" id="playerCount" min="1" max="8" value="2">
        </div>
        <div class="player-names" id="playerNames"></div>
        <button id="startBtn">Start Game</button>
    </div>

    <!-- Game area -->
    <div id="game" class="hidden">
        <div class="status" id="status">Press Roll to Start</div>

        <div class="row" id="row"></div>

        <div class="controls">
            <button id="rollBtn">Roll</button>
        </div>

        <div class="card-wrap">
            <table class="scorecard" id="scorecard"></table>
        </div>
    </div>

    <script>
        const COUNT = 5;
        const MAX_ROLLS = 3;

        const UPPER_CATEGORIES = [
            { key: 'ones', label: 'Ones', face: 1 },
            { key: 'twos', label: 'Twos', face: 2 },
            { key: 'threes', label: 'Threes', face: 3 },
            { key: 'fours', label: 'Fours', face: 4 },
            { key: 'fives', label: 'Fives', face: 5 },
            { key: 'sixes', label: 'Sixes', face: 6 },
        ];

        const LOWER_CATEGORIES_BEFORE_BONUS = [
            { key: 'threeKind', label: '3 of a Kind' },
            { key: 'fourKind', label: '4 of a Kind' },
            { key: 'fullHouse', label: 'Full House' },
            { key: 'smallStraight', label: 'Sm. Straight' },
            { key: 'largeStraight', label: 'Lg. Straight' },
            { key: 'yahtzee', label: 'Yahtzee' },
        ];
        const CHANCE_CATEGORY = { key: 'chance', label: 'Chance' };
        const LOWER_CATEGORIES = [...LOWER_CATEGORIES_BEFORE_BONUS, CHANCE_CATEGORY];

        const ALL_CATEGORIES = [...UPPER_CATEGORIES, ...LOWER_CATEGORIES];
        const UPPER_BONUS_THRESHOLD = 63;
        const UPPER_BONUS = 35;
        const YAHTZEE_BONUS_POINTS = 100;

        // ---- DOM refs ----
        const setupEl = document.getElementById('setup');
        const gameEl = document.getElementById('game');
        const playerCountInput = document.getElementById('playerCount');
        const playerNamesEl = document.getElementById('playerNames');
        const startBtn = document.getElementById('startBtn');
        const newGameBtn = document.getElementById('newGameBtn');

        const row = document.getElementById('row');
        const status = document.getElementById('status');
        const rollBtn = document.getElementById('rollBtn');
        const scorecardEl = document.getElementById('scorecard');

        // ---- Game state ----
        let dice = [];
        let dieEls = [];
        let rollsLeft = MAX_ROLLS;
        let players = [];
        let currentPlayer = 0;
        let gameOver = false;

        // ================= Setup screen =================

        function renderPlayerNameInputs() {
            const count = clampPlayerCount();
            playerNamesEl.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Player ' + (i + 1) + ' name';
                input.maxLength = 16;
                input.dataset.index = i;
                playerNamesEl.appendChild(input);
            }
        }

        function clampPlayerCount() {
            let n = parseInt(playerCountInput.value, 10);
            if (isNaN(n)) n = 2;
            n = Math.max(1, Math.min(8, n));
            playerCountInput.value = n;
            return n;
        }

        playerCountInput.addEventListener('input', renderPlayerNameInputs);

        startBtn.addEventListener('click', () => {
            const count = clampPlayerCount();
            const nameInputs = playerNamesEl.querySelectorAll('input');
            players = Array.from({ length: count }, (_, i) => {
                const typed = nameInputs[i] && nameInputs[i].value.trim();
                return {
                    name: typed || ('Player ' + (i + 1)),
                    scores: Object.fromEntries(ALL_CATEGORIES.map(c => [c.key, null])),
                    yahtzeeBonusCount: 0,
                };
            });
            currentPlayer = 0;
            gameOver = false;
            setupEl.classList.add('hidden');
            gameEl.classList.remove('hidden');
            newGameBtn.classList.remove('hidden');
            buildDice();
            startTurn();
            buildScorecard();
        });

        newGameBtn.addEventListener('click', () => {
            gameEl.classList.add('hidden');
            newGameBtn.classList.add('hidden');
            setupEl.classList.remove('hidden');
        });

        // ================= Dice =================

        function buildDice() {
            row.innerHTML = '';
            dieEls = [];
            for (let i = 0; i < COUNT; i++) {
                const die = document.createElement('div');
                die.className = 'die';

                const number = document.createElement('span');
                number.className = 'number';

                die.appendChild(number);
                die.addEventListener('click', () => toggleKeep(i));

                row.appendChild(die);
                dieEls.push({ die, number });
            }
        }

        function updateDie(i) {
            const d = dice[i];
            const { die, number } = dieEls[i];
            number.textContent = d.value === null ? '' : d.value;
            die.classList.toggle('kept', d.kept);
        }

        function updateAllDice() {
            for (let i = 0; i < COUNT; i++) updateDie(i);
        }

        function toggleKeep(i) {
            if (gameOver) return;
            // Can only keep a die that has been rolled.
            if (dice[i].value === null) return;
            dice[i].kept = !dice[i].kept;
            updateDie(i);
        }

        function roll() {
            if (gameOver || rollsLeft <= 0) return;
            const hasRollable = dice.some(d => !d.kept);
            if (!hasRollable) return;

            dice.forEach(d => {
                if (!d.kept) {
                    d.value = 1 + Math.floor(Math.random() * 6);
                }
            });
            rollsLeft--;
            updateAllDice();
            updateStatus();
            rollBtn.disabled = rollsLeft <= 0;
            renderScorecard();
        }

        function startTurn() {
            dice = Array.from({ length: COUNT }, () => ({ value: null, kept: false }));
            rollsLeft = MAX_ROLLS;
            updateAllDice();
            rollBtn.disabled = false;
            updateStatus();
        }

        function updateStatus() {
            const p = players[currentPlayer];
            const rolled = dice.some(d => d.value !== null);
            const rollText = rolled
                ? 'Roll ' + (MAX_ROLLS - rollsLeft) + ' of ' + MAX_ROLLS
                : 'Press Roll to Start';
            status.textContent = p.name + "'s turn — " + rollText;
        }

        // ================= Scoring =================

        function diceValues() {
            return dice.map(d => d.value).filter(v => v !== null);
        }

        function countsOf(values) {
            const counts = [0, 0, 0, 0, 0, 0, 0];
            values.forEach(v => counts[v]++);
            return counts;
        }

        function isYahtzeeRoll(values) {
            return values.length === COUNT && countsOf(values).some(c => c === 5);
        }

        // The Upper Section category that a Yahtzee roll (five-of-a-kind) matches,
        // e.g. five 4s matches the Fours box.
        function matchingUpperKey(values) {
            const face = values[0];
            const upper = UPPER_CATEGORIES.find(c => c.face === face);
            return upper ? upper.key : null;
        }

        // Joker Rules apply when a Yahtzee is rolled AFTER the Yahtzee box has
        // already been scored (with 50 or with 0) for that player.
        function jokerActiveFor(player, values) {
            return !!player && isYahtzeeRoll(values) && player.scores.yahtzee !== null;
        }

        function calcScore(key, values, player) {
            if (values.length < COUNT) return 0;
            const counts = countsOf(values);
            const sum = values.reduce((a, b) => a + b, 0);

            const upper = UPPER_CATEGORIES.find(c => c.key === key);
            if (upper) return counts[upper.face] * upper.face;

            // Under the Joker Rules, once the matching Upper Section box is
            // filled, Full House / Small Straight / Large Straight always
            // score their fixed values for a Joker (extra Yahtzee) roll.
            let jokerBonusValue = null;
            if (jokerActiveFor(player, values)) {
                const upperKey = matchingUpperKey(values);
                const upperFilled = upperKey ? player.scores[upperKey] !== null : false;
                if (upperFilled) {
                    if (key === 'fullHouse') jokerBonusValue = 25;
                    else if (key === 'smallStraight') jokerBonusValue = 30;
                    else if (key === 'largeStraight') jokerBonusValue = 40;
                }
            }

            switch (key) {
                case 'threeKind':
                    return counts.some(c => c >= 3) ? sum : 0;
                case 'fourKind':
                    return counts.some(c => c >= 4) ? sum : 0;
                case 'fullHouse':
                    if (jokerBonusValue !== null) return jokerBonusValue;
                    return counts.includes(3) && counts.includes(2) ? 25 : 0;
                case 'smallStraight': {
                    if (jokerBonusValue !== null) return jokerBonusValue;
                    const set = new Set(values);
                    const runs = [[1, 2, 3, 4], [2, 3, 4, 5], [3, 4, 5, 6]];
                    return runs.some(run => run.every(v => set.has(v))) ? 30 : 0;
                }
                case 'largeStraight': {
                    if (jokerBonusValue !== null) return jokerBonusValue;
                    const set = new Set(values);
                    const runs = [[1, 2, 3, 4, 5], [2, 3, 4, 5, 6]];
                    return runs.some(run => run.every(v => set.has(v)) && set.size === 5) ? 40 : 0;
                }
                case 'yahtzee':
                    return counts.some(c => c === 5) ? 50 : 0;
                case 'chance':
                    return sum;
                default:
                    return 0;
            }
        }

        function upperSubtotal(p) {
            return UPPER_CATEGORIES.reduce((sum, c) => sum + (p.scores[c.key] || 0), 0);
        }

        function upperBonus(p) {
            return upperSubtotal(p) >= UPPER_BONUS_THRESHOLD ? UPPER_BONUS : 0;
        }

        function yahtzeeBonusPoints(p) {
            return p.yahtzeeBonusCount * YAHTZEE_BONUS_POINTS;
        }

        function totalScore(p) {
            const lower = LOWER_CATEGORIES.reduce((sum, c) => sum + (p.scores[c.key] || 0), 0);
            return upperSubtotal(p) + upperBonus(p) + lower + yahtzeeBonusPoints(p);
        }

        function allFilled(p) {
            return ALL_CATEGORIES.every(c => p.scores[c.key] !== null);
        }

        // ================= Score card UI =================

        function buildScorecard() {
            scorecardEl.innerHTML = '';

            const thead = document.createElement('thead');
            const headRow = document.createElement('tr');
            headRow.appendChild(document.createElement('th')).classList.add('category');
            players.forEach((p, i) => {
                const th = document.createElement('th');
                th.textContent = p.name;
                th.dataset.playerIndex = i;
                headRow.appendChild(th);
            });
            thead.appendChild(headRow);
            scorecardEl.appendChild(thead);

            const tbody = document.createElement('tbody');

            function addCategoryRows(cats) {
                cats.forEach(cat => {
                    const tr = document.createElement('tr');
                    const th = document.createElement('td');
                    th.className = 'category';
                    th.textContent = cat.label;
                    tr.appendChild(th);
                    players.forEach((p, i) => {
                        const td = document.createElement('td');
                        td.className = 'score-cell';
                        td.dataset.playerIndex = i;
                        td.dataset.category = cat.key;
                        td.addEventListener('click', () => attemptScore(i, cat.key));
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            }

            addCategoryRows(UPPER_CATEGORIES);

            const subtotalRow = document.createElement('tr');
            subtotalRow.className = 'subtotal';
            const subtotalLabel = document.createElement('td');
            subtotalLabel.className = 'category';
            subtotalLabel.textContent = 'Upper Subtotal';
            subtotalRow.appendChild(subtotalLabel);
            players.forEach((p, i) => {
                const td = document.createElement('td');
                td.dataset.role = 'upperSubtotal';
                td.dataset.playerIndex = i;
                subtotalRow.appendChild(td);
            });
            tbody.appendChild(subtotalRow);

            const bonusRow = document.createElement('tr');
            const bonusLabel = document.createElement('td');
            bonusLabel.className = 'category';
            bonusLabel.textContent = 'Bonus (63+ = 35)';
            bonusRow.appendChild(bonusLabel);
            players.forEach((p, i) => {
                const td = document.createElement('td');
                td.dataset.role = 'upperBonus';
                td.dataset.playerIndex = i;
                bonusRow.appendChild(td);
            });
            tbody.appendChild(bonusRow);

            addCategoryRows(LOWER_CATEGORIES_BEFORE_BONUS);

            const yahtzeeBonusRow = document.createElement('tr');
            const yahtzeeBonusLabel = document.createElement('td');
            yahtzeeBonusLabel.className = 'category';
            yahtzeeBonusLabel.textContent = 'Yahtzee Bonus (100 ea.)';
            yahtzeeBonusRow.appendChild(yahtzeeBonusLabel);
            players.forEach((p, i) => {
                const td = document.createElement('td');
                td.dataset.role = 'yahtzeeBonus';
                td.dataset.playerIndex = i;
                yahtzeeBonusRow.appendChild(td);
            });
            tbody.appendChild(yahtzeeBonusRow);

            addCategoryRows([CHANCE_CATEGORY]);

            const totalRow = document.createElement('tr');
            totalRow.className = 'total';
            const totalLabel = document.createElement('td');
            totalLabel.className = 'category';
            totalLabel.textContent = 'Total';
            totalRow.appendChild(totalLabel);
            players.forEach((p, i) => {
                const td = document.createElement('td');
                td.dataset.role = 'total';
                td.dataset.playerIndex = i;
                totalRow.appendChild(td);
            });
            tbody.appendChild(totalRow);

            scorecardEl.appendChild(tbody);
            renderScorecard();
        }

        function renderScorecard() {
            const values = diceValues();
            const canPick = !gameOver && values.length === COUNT;

            // Header highlight
            scorecardEl.querySelectorAll('thead th[data-player-index]').forEach(th => {
                const i = Number(th.dataset.playerIndex);
                th.classList.toggle('active-player', i === currentPlayer && !gameOver);
            });

            ALL_CATEGORIES.forEach(cat => {
                players.forEach((p, i) => {
                    const td = scorecardEl.querySelector(
                        'td.score-cell[data-player-index="' + i + '"][data-category="' + cat.key + '"]'
                    );
                    if (!td) return;
                    const scored = p.scores[cat.key];
                    if (scored !== null) {
                        td.textContent = scored;
                        td.classList.add('filled');
                        td.classList.remove('pickable');
                    } else if (canPick && i === currentPlayer) {
                        td.textContent = calcScore(cat.key, values, p);
                        td.classList.add('pickable');
                        td.classList.remove('filled');
                    } else {
                        td.textContent = '';
                        td.classList.remove('pickable', 'filled');
                    }
                });
            });

            players.forEach((p, i) => {
                const subEl = scorecardEl.querySelector('[data-role="upperSubtotal"][data-player-index="' + i + '"]');
                const bonusEl = scorecardEl.querySelector('[data-role="upperBonus"][data-player-index="' + i + '"]');
                const yahtzeeBonusEl = scorecardEl.querySelector('[data-role="yahtzeeBonus"][data-player-index="' + i + '"]');
                const totalEl = scorecardEl.querySelector('[data-role="total"][data-player-index="' + i + '"]');
                if (subEl) subEl.textContent = upperSubtotal(p);
                if (bonusEl) bonusEl.textContent = upperBonus(p);
                if (yahtzeeBonusEl) {
                    yahtzeeBonusEl.textContent = p.yahtzeeBonusCount > 0
                        ? '✓'.repeat(p.yahtzeeBonusCount) + ' ' + yahtzeeBonusPoints(p)
                        : '';
                }
                if (totalEl) totalEl.textContent = totalScore(p);
            });
        }

        function attemptScore(playerIndex, categoryKey) {
            if (gameOver) return;
            if (playerIndex !== currentPlayer) return;
            const p = players[playerIndex];
            if (p.scores[categoryKey] !== null) return;
            const values = diceValues();
            if (values.length !== COUNT) return; // must roll at least once

            // Yahtzee Bonus: an extra Yahtzee (five-of-a-kind) earns a 100-point
            // bonus chip only if the Yahtzee box was already scored with 50.
            // Must be checked before this category's own score is recorded,
            // since scoring the Yahtzee box itself for the first time doesn't count.
            if (isYahtzeeRoll(values) && p.scores.yahtzee === 50) {
                p.yahtzeeBonusCount++;
            }

            p.scores[categoryKey] = calcScore(categoryKey, values, p);
            advanceTurn();
        }

        function advanceTurn() {
            if (players.every(allFilled)) {
                endGame();
                return;
            }
            currentPlayer = (currentPlayer + 1) % players.length;
            startTurn();
            renderScorecard();
        }

        function endGame() {
            gameOver = true;
            rollBtn.disabled = true;
            const best = players.reduce((a, b) => (totalScore(b) > totalScore(a) ? b : a));
            const tie = players.filter(p => totalScore(p) === totalScore(best)).length > 1;
            status.textContent = tie
                ? "Game Over — It's a tie at " + totalScore(best) + '!'
                : 'Game Over — ' + best.name + ' wins with ' + totalScore(best) + '!';
            renderScorecard();
        }

        rollBtn.addEventListener('click', roll);

        renderPlayerNameInputs();
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</body>

</html>
