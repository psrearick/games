<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boggle</title>
    <style>
        :root {
            --bg: oklch(0.3073 0.0106 253.99);
            --die: oklch(0.3838 0.0143 252.26);
            --ink: oklch(0.624 0.0035 247.86);
            --bar: oklch(0.5969 0.0442 248.57);
            --die-border: oklch(from var(--die) calc(l - 0.10) c h);
            --die-shadow: oklch(from var(--bg) calc(l - 0.28) c h / 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            animation: none !important;
            transition: none !important;
        }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
            font-family: 'Lato', 'Open Sans', sans-serif, serif;
        }

        .grid {
            display: grid;
            /* columns set by JS */
            gap: clamp(6px, 1.1vmin, 14px);
            width: min(80vw, 64vh);
        }

        .die {
            aspect-ratio: 1 / 1;
            background: var(--die);
            border: 2px solid var(--die-border);
            border-radius: clamp(5px, 0.9vmin, 12px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 10px var(--die-shadow);
            position: relative;
        }

        .letter {
            font-size: clamp(24px, 7vmin, 84px);
            font-weight: bold;
            color: var(--ink);
            line-height: 1;
            user-select: none;
        }

        .letter.wide {
            font-size: clamp(18px, 5.2vmin, 62px);
        }

        .underline-mark {
            position: absolute;
            bottom: clamp(7px, 2vmin, 22px);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(12px, 5vmin, 26px);
            height: 2px;
            background: var(--ink);
            border-radius: 1px;
        }
    </style>
</head>

<body>

    <div class="grid" id="grid"></div>

    <script>
        // Standard 4x4 Boggle -- 16 dice (New Boggle set, post-1990)
        const DICE_4 = [
            ['A', 'A', 'E', 'E', 'G', 'N'],
            ['E', 'L', 'R', 'T', 'T', 'Y'],
            ['A', 'O', 'O', 'T', 'T', 'W'],
            ['A', 'B', 'B', 'J', 'O', 'O'],
            ['E', 'H', 'R', 'T', 'V', 'W'],
            ['C', 'I', 'M', 'O', 'T', 'U'],
            ['D', 'I', 'S', 'T', 'T', 'Y'],
            ['E', 'I', 'O', 'S', 'S', 'T'],
            ['D', 'E', 'L', 'R', 'V', 'Y'],
            ['A', 'C', 'H', 'O', 'P', 'S'],
            ['H', 'I', 'M', 'N', 'Qu', 'U'],
            ['E', 'E', 'F', 'H', 'I', 'Y'],
            ['E', 'E', 'G', 'H', 'N', 'W'],
            ['A', 'F', 'F', 'K', 'P', 'S'],
            ['H', 'L', 'N', 'N', 'R', 'Z'],
            ['D', 'E', 'I', 'L', 'R', 'X'],
        ];

        // Big Boggle 5x5 -- 25 dice
        const DICE_5 = [
            ['A', 'A', 'A', 'F', 'R', 'S'],
            ['A', 'A', 'E', 'E', 'G', 'N'],
            ['A', 'A', 'E', 'E', 'G', 'N'],
            ['A', 'A', 'F', 'I', 'R', 'S'],
            ['A', 'D', 'E', 'N', 'N', 'N'],
            ['A', 'E', 'E', 'E', 'E', 'M'],
            ['A', 'E', 'G', 'M', 'U', 'U'],
            ['A', 'E', 'G', 'M', 'N', 'N'],
            ['A', 'F', 'I', 'R', 'S', 'Y'],
            ['B', 'J', 'K', 'Qu', 'X', 'Z'],
            ['C', 'C', 'N', 'S', 'T', 'W'],
            ['C', 'E', 'I', 'I', 'L', 'T'],
            ['C', 'E', 'I', 'L', 'P', 'T'],
            ['D', 'D', 'H', 'N', 'O', 'T'],
            ['D', 'H', 'H', 'L', 'O', 'R'],
            ['D', 'H', 'L', 'N', 'O', 'R'],
            ['D', 'H', 'L', 'N', 'O', 'R'],
            ['E', 'E', 'I', 'I', 'I', 'T'],
            ['E', 'N', 'S', 'S', 'S', 'U'],
            ['E', 'E', 'T', 'T', 'I', 'I'],
            ['F', 'I', 'P', 'R', 'S', 'Y'],
            ['G', 'O', 'R', 'R', 'V', 'W'],
            ['H', 'I', 'P', 'R', 'R', 'Y'],
            ['N', 'O', 'O', 'T', 'U', 'W'],
            ['O', 'O', 'O', 'T', 'T', 'U'],
        ];

        const UNDERLINED = new Set(['N', 'Z']);
        const WIDE = new Set(['W', 'M', 'Qu']);

        const params = new URLSearchParams(window.location.search);
        const isBig = params.get('size') === '5';
        const DICE = isBig ? DICE_5 : DICE_4;
        const COLS = isBig ? 5 : 4;
        document.getElementById('grid').style.gridTemplateColumns =
            `repeat(${COLS}, 1fr)`;

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function buildGrid() {
            const shuffledDice = shuffle(DICE);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            shuffledDice.forEach(faces => {
                const face = faces[Math.floor(Math.random() * faces.length)];
                const dieEl = document.createElement('div');
                dieEl.className = 'die';
                const span = document.createElement('span');
                span.className = 'letter' + (WIDE.has(face) ? ' wide' : '');
                span.textContent = face;
                dieEl.appendChild(span);
                if (UNDERLINED.has(face)) {
                    const ul = document.createElement('div');
                    ul.className = 'underline-mark';
                    dieEl.appendChild(ul);
                }
                grid.appendChild(dieEl);
            });
        }

        buildGrid();
    </script>
</body>

</html>
