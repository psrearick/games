<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boggle</title>
  <style>
    :root {
      /* ── The four colors worth tuning ──────────────────────────────────
         oklch(lightness chroma hue)
         To shift warmth: nudge the hue on --bg, --die, --ink together.
         To make it lighter/darker overall: nudge lightness on each.
         --bar is intentionally a different hue (green); change it freely. */

        --bg:   oklch(0.72 0.020 68);
        --die:  oklch(0.91 0.014 75);
        --ink:  oklch(0.40 0.044 55);
        --bar:  oklch(0.52 0.080 152);

        /* --bg:   oklch(0.8825 0.0099 87.47);
        --die:  oklch(0.8081 0.0105 81.79);
        --ink:  oklch(0.3235 0.012 258.37);
        --bar:  oklch(0.6963 0.029 241.35); */

        /* --bg:   oklch(0.9615 0.0098 87.47);
        --die:  oklch(0.9059 0.0179 81.33);
        --ink:  oklch(0.4091 0 0);
        --bar:  oklch(0.7353 0.0213 177.21); */

        --bg:   oklch(0.3073 0.0106 253.99);
        --die:  oklch(0.3838 0.0143 252.26);
        --ink:  oklch(0.824 0.0035 247.86);
        --bar:  oklch(0.5969 0.0442 248.57);


      /* ── Derived: change the four above, these follow automatically ───
         Each one is just a lightness shift from its parent. */
      --die-border:  oklch(from var(--die) calc(l - 0.10) c h);
      --die-shadow:  oklch(from var(--bg)  calc(l - 0.28) c h / 0.25);
      --track:       oklch(from var(--bg)  calc(l - 0.10) c h);
      --btn:         oklch(from var(--die) calc(l - 0.06) c h);
      --btn-press:   oklch(from var(--die) calc(l - 0.14) c h);
    }

    /* Kill all animation and transition globally */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      animation: none !important;
      transition: none !important;
    }

    /* Single deliberate exception: end-of-game overlay fades in slowly.
       .overlay is more specific than *, so its !important wins. */
    .overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 3s ease !important;
    }
    .overlay.done {
      opacity: 0.5;
    }

    body {
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Header row: title left, New Game button right */
    .header {
      display: flex;
      align-items: center;
      gap: clamp(14px, 2.2vmin, 28px);
      margin-bottom: clamp(30px, 1.6vmin, 60px);
      justify-content: space-between;
      width: min(80vw, 64vh);
    }

    h1 {
      font-size: clamp(14px, 2.4vmin, 28px);
      color: var(--ink);
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .grid {
      display: grid;
      /* columns set by JS */
      gap: clamp(6px, 1.1vmin, 14px);
      width: min(80vw, 64vh);
    }

    .die {
      aspect-ratio: 1 / 1;
      background: var(--die);
      border: 2px solid var(--die-border);
      border-radius: clamp(5px, 0.9vmin, 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 4px 10px var(--die-shadow);
      position: relative;
    }

    .letter {
      font-size: clamp(24px, 7vmin, 84px);
      font-weight: bold;
      color: var(--ink);
      line-height: 1;
      font-family: Georgia, 'Times New Roman', serif;
      user-select: none;
    }

    .letter.wide {
      font-size: clamp(18px, 5.2vmin, 62px);
    }

    .underline-mark {
      position: absolute;
      bottom: clamp(14px, 1vmin, 14px);
      left: 50%;
      transform: translateX(-50%);
      width: clamp(12px, 5vmin, 26px);
      height: 2px;
      background: var(--ink);
      border-radius: 1px;
    }

    /* Timer section sits above the overlay */
    .timer-section {
      position: relative;
      z-index: 20;
      width: min(80vw, 64vh);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(7px, 1.1vmin, 14px);
      margin-top: clamp(30px, 1.8vmin, 60px);
    }

    .progress-bar-container {
      width: 100%;
      height: clamp(7px, 1.1vmin, 14px);
      background: var(--track);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--bar);
      border-radius: 99px;
      width: 100%;
    }

    .buttons {
      display: flex;
      gap: clamp(10px, 1.5vmin, 20px);
    }

    button {
      padding: clamp(7px, 1.1vmin, 13px) clamp(18px, 2.8vmin, 34px);
      font-size: clamp(13px, 1.9vmin, 20px);
      font-family: Georgia, serif;
      font-weight: bold;
      background: var(--btn);
      color: var(--ink);
      border: 2px solid var(--die-border);
      border-radius: clamp(4px, 0.7vmin, 9px);
      cursor: pointer;
      letter-spacing: 0.06em;
    }

    button:active {
      background: var(--btn-press);
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <div class="header">
    <h1 id="title">Boggle</h1>
    <button onclick="newGame()">New Game</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="timer-section">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="buttons">
        <button id="startStopBtn" onclick="toggleTimer()">Start</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <script>
    // Standard 4x4 Boggle -- 16 dice (New Boggle set, post-1990)
    const DICE_4 = [
      ['A', 'A', 'E', 'E', 'G', 'N'],
      ['E', 'L', 'R', 'T', 'T', 'Y'],
      ['A', 'O', 'O', 'T', 'T', 'W'],
      ['A', 'B', 'B', 'J', 'O', 'O'],
      ['E', 'H', 'R', 'T', 'V', 'W'],
      ['C', 'I', 'M', 'O', 'T', 'U'],
      ['D', 'I', 'S', 'T', 'T', 'Y'],
      ['E', 'I', 'O', 'S', 'S', 'T'],
      ['D', 'E', 'L', 'R', 'V', 'Y'],
      ['A', 'C', 'H', 'O', 'P', 'S'],
      ['H', 'I', 'M', 'N', 'Qu', 'U'],
      ['E', 'E', 'F', 'H', 'I', 'Y'],
      ['E', 'E', 'G', 'H', 'N', 'W'],
      ['A', 'F', 'F', 'K', 'P', 'S'],
      ['H', 'L', 'N', 'N', 'R', 'Z'],
      ['D', 'E', 'I', 'L', 'R', 'X'],
    ];

    // Big Boggle 5x5 -- 25 dice
    const DICE_5 = [
      ['A', 'A', 'A', 'F', 'R', 'S'],
      ['A', 'A', 'E', 'E', 'G', 'N'],
      ['A', 'A', 'E', 'E', 'G', 'N'],
      ['A', 'A', 'F', 'I', 'R', 'S'],
      ['A', 'D', 'E', 'N', 'N', 'N'],
      ['A', 'E', 'E', 'E', 'E', 'M'],
      ['A', 'E', 'G', 'M', 'U', 'U'],
      ['A', 'E', 'G', 'M', 'N', 'N'],
      ['A', 'F', 'I', 'R', 'S', 'Y'],
      ['B', 'J', 'K', 'Qu', 'X', 'Z'],
      ['C', 'C', 'N', 'S', 'T', 'W'],
      ['C', 'E', 'I', 'I', 'L', 'T'],
      ['C', 'E', 'I', 'L', 'P', 'T'],
      ['D', 'D', 'H', 'N', 'O', 'T'],
      ['D', 'H', 'H', 'L', 'O', 'R'],
      ['D', 'H', 'L', 'N', 'O', 'R'],
      ['D', 'H', 'L', 'N', 'O', 'R'],
      ['E', 'E', 'I', 'I', 'I', 'T'],
      ['E', 'N', 'S', 'S', 'S', 'U'],
      ['E', 'E', 'T', 'T', 'I', 'I'],
      ['F', 'I', 'P', 'R', 'S', 'Y'],
      ['G', 'O', 'R', 'R', 'V', 'W'],
      ['H', 'I', 'P', 'R', 'R', 'Y'],
      ['N', 'O', 'O', 'T', 'U', 'W'],
      ['O', 'O', 'O', 'T', 'T', 'U'],
    ];

    const UNDERLINED = new Set(['N', 'Z']);
    const WIDE       = new Set(['W', 'M', 'Qu']);

    const params = new URLSearchParams(window.location.search);
    const isBig  = params.get('size') === '5';
    const DICE   = isBig ? DICE_5 : DICE_4;
    const COLS   = isBig ? 5 : 4;

    document.getElementById('title').textContent =
      isBig ? 'Big Boggle' : 'Boggle';
    document.getElementById('grid').style.gridTemplateColumns =
      `repeat(${COLS}, 1fr)`;

    const overlay = document.getElementById('overlay');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildGrid() {
      const shuffledDice = shuffle(DICE);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      shuffledDice.forEach(faces => {
        const face = faces[Math.floor(Math.random() * faces.length)];
        const dieEl = document.createElement('div');
        dieEl.className = 'die';
        const span = document.createElement('span');
        span.className = 'letter' + (WIDE.has(face) ? ' wide' : '');
        span.textContent = face;
        dieEl.appendChild(span);
        if (UNDERLINED.has(face)) {
          const ul = document.createElement('div');
          ul.className = 'underline-mark';
          dieEl.appendChild(ul);
        }
        grid.appendChild(dieEl);
      });
    }

    const TOTAL  = 3 * 60;
    let timeLeft = TOTAL;
    let running  = false;
    let timerId  = null;

    function updateUI() {
      document.getElementById('progressBar').style.width =
        (timeLeft / TOTAL * 100).toFixed(2) + '%';
    }

    function toggleTimer() {
      const btn = document.getElementById('startStopBtn');
      if (running) {
        clearInterval(timerId);
        running = false;
        btn.textContent = 'Start';
      } else {
        if (timeLeft <= 0) return;
        running = true;
        btn.textContent = 'Stop';
        timerId = setInterval(() => {
          timeLeft--;
          updateUI();
          if (timeLeft <= 0) {
            clearInterval(timerId);
            running = false;
            btn.textContent = 'Start';
            overlay.classList.add('done');
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerId);
      running  = false;
      timeLeft = TOTAL;
      document.getElementById('startStopBtn').textContent = 'Start';
      overlay.classList.remove('done');
      updateUI();
    }

    // New Game: fresh dice + timer reset + overlay clear
    function newGame() {
      resetTimer();
      buildGrid();
    }

    buildGrid();
    updateUI();
  </script>
</body>
</html>
