<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
        if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="boggle-shared.css">
    <title>Boggle</title>
    <style>
        /* ---- HUD ---- */
        .hud {
            display: flex;
            gap: clamp(16px, 4vmin, 48px);
            justify-content: center;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .hud-label {
            color: var(--ink);
            font-size: clamp(10px, 1.2vmin, 13px);
            letter-spacing: 0.1em;
            opacity: 0.75;
        }

        .hud-value {
            color: var(--bar);
            font-size: clamp(18px, 3vmin, 30px);
            font-weight: bold;
        }

        .hud-value.timer.low {
            color: var(--warn);
        }

        /* ---- Game screen ---- */
        #game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 2.2vmin, 26px);
            width: 100%;
        }

        /* ---- Grid ---- */
        .grid {
            width: min(80vw, 60vh);
            touch-action: none;
        }

        /* Once the game ends, touching a die does nothing gameplay-wise, so
           drop the touch-action restriction to let a touch drag over the
           board scroll the page like anywhere else. */
        .grid.inactive {
            touch-action: auto;
        }

        .die {
            cursor: pointer;
            user-select: none;
        }

        .die.selected {
            background: var(--die-kept);
            border-color: var(--accent);
        }

        .grid.has-valid-word .die.selected {
            border-width: 4px;
        }

        .letter {
            font-size: clamp(24px, 6vmin, 72px);
        }

        .die.selected .letter {
            color: var(--accent);
        }

        .letter.wide {
            font-size: clamp(21px, 5.3vmin, 63px);
        }

        .order-badge {
            position: absolute;
            top: clamp(3px, 0.8vmin, 8px);
            left: clamp(3px, 0.8vmin, 8px);
            font-size: clamp(9px, 1.2vmin, 13px);
            font-weight: bold;
            color: var(--accent);
            line-height: 1;
        }

        /* Before the game ends, keep the grid fixed at true center and let
           the found-words panel occupy space to its right without
           shifting it -- unlike the post-game reveal (.board-area rules
           in boggle-shared.css), which centers the whole shrunk block
           together once the board-area switches to #game.with-list. The
           symmetric side columns are what keep the (auto-width) middle
           column centered regardless of the panel's width. Static has no
           "words found while playing" state, so it never needs this. */
        @media (min-width: 900px) {
            #game:not(.with-list) #board-area {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: start;
            }

            #game:not(.with-list) #board-area .grid {
                grid-column: 2;
            }

            #game:not(.with-list) #board-area .word-list-panel {
                grid-column: 3;
                justify-self: start;
                max-width: min(28vw, 320px);
            }
        }

        /* The found-words list during play is open-ended (a full game can
           turn up a lot of words) and, unlike the post-game reveal, isn't
           sized to avoid ever scrolling -- so it gets its own scrollbox
           instead of growing the panel indefinitely. */
        #found-list {
            max-height: min(55vh, 480px);
            overflow-y: auto;
        }

        /* Below the 900px breakpoint, pin the whole in-game area to the
           viewport (see body.in-game below) so the found-words list has to
           shrink instead of the page just growing taller -- the timer,
           grid, and current-word controls stay put and visible, and
           #found-list (the one thing genuinely open-ended) gets a height
           floor so it shrinks to fit but never disappears.
           Nothing here uses flex-grow, and nothing but #found-list uses
           min-height -- nowhere else in this chain is a real floor wanted,
           only the ability to shrink, and giving an *intermediate*
           container (e.g. .word-list-panel) its own min-height: 0 backfired:
           it let the panel get shrunk smaller than #found-list's own floor
           demanded, so the list overflowed past its own (too-small) parent
           box instead of the parent growing to fit it. Leaving every
           ancestor at the default automatic minimum lets that calculation
           do its job -- it already bottoms out correctly at #found-list's
           explicit floor, recursively, without help.
           #found-list also switches to two columns here -- a full game can
           turn up a couple dozen words, and on a phone-width column that
           used to mean either a lot of internal scrolling or (with the
           height floor) a list that only ever shows a handful at once.
           Columns roughly double how much is visible before either kicks
           in. column-count is fixed (rather than a responsive column-width)
           so the browser can't respond to a tall list by silently adding a
           third column and overflowing the box sideways -- see the near-
           identical reasoning for the post-game reveal's own columns in
           boggle-shared.js. */
        @media (max-width: 899px) {
            body.scrollable.in-game {
                height: 100dvh;
            }

            #game:not(.with-list) #found-list {
                min-height: min(120px, 30vh);
                column-count: 2;
                column-gap: 16px;
            }
        }

        /* Portrait: plenty of vertical room on a tall phone, and the grid
           wants its full width, so stack the grid above the word-list
           panel. */
        @media (max-width: 899px) and (orientation: portrait) {
            #game:not(.with-list) #board-area {
                flex-direction: column;
                /* The base rule (boggle-shared.css) sets flex-wrap: wrap for
                   the row layout used elsewhere -- left as-is here, a
                   column-direction container with wrap would start a new
                   *column of items to the side* the moment its content
                   doesn't fit the available height, instead of just
                   overflowing downward. That silently pushed the word-list
                   panel next to the grid and off the edge of the screen. */
                flex-wrap: nowrap;
                align-items: center;
                width: 100%;
            }

            #game:not(.with-list) #board-area .grid {
                flex: 0 0 auto;
            }

            #game:not(.with-list) #board-area .word-list-panel {
                width: 100%;
                max-width: 100%;
            }
        }

        /* Landscape: a short, wide phone doesn't have the height to stack
           the grid above the list without one of the two needing a scroll
           to bring it into view -- sit them side by side instead, grid on
           the left, so both are visible together. */
        @media (max-width: 899px) and (orientation: landscape) {
            #game:not(.with-list) #board-area {
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: flex-start;
                justify-content: flex-start;
                width: 100%;
            }

            #game:not(.with-list) #board-area .grid {
                flex: 0 0 auto;
            }

            #game:not(.with-list) #board-area .word-list-panel {
                flex: 1;
                min-width: 0;
                width: auto;
                max-width: none;
            }

            #game:not(.with-list) #found-list {
                max-height: min(50vh, 420px);
            }
        }

        /* ---- Current word / controls ---- */
        .word-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: min(94vw, 460px);
        }

        .current-word {
            min-height: 1.4em;
            font-size: clamp(18px, 3vmin, 28px);
            font-weight: bold;
            letter-spacing: 0.08em;
            color: var(--ink);
            text-align: center;
        }

        .status-line.success {
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>

<body class="scrollable">

    <div class="button-bar">
        <div class="left">
            <a href="index.html"><button>Home</button></a>
        </div>
        <div class="right">
            <button id="end-game-btn" class="hidden">End Game</button>
            <button id="new-game-btn" class="hidden">New Game</button>
        </div>
    </div>

    <!-- Setup screen -->
    <div class="setup" id="setup">
        <div class="setup-row">
            <div class="label">Board Size</div>
            <div class="option-group" id="size-options">
                <button class="option" data-size="4">Classic 4x4</button>
                <button class="option" data-size="5">Big 5x5</button>
            </div>
        </div>
        <div class="setup-row">
            <div class="label">Time Limit</div>
            <div class="option-group" id="time-options">
                <button class="option" data-minutes="1">1 min</button>
                <button class="option" data-minutes="2">2 min</button>
                <button class="option" data-minutes="3">3 min</button>
                <button class="option" data-minutes="5">5 min</button>
            </div>
        </div>
        <button id="start-btn" disabled>Start Game</button>
        <div class="dictionary-status" id="dictionary-status">Loading dictionary…</div>
    </div>

    <!-- Game screen -->
    <div id="game" class="hidden">
        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">TIME</div>
                <div class="hud-value timer" id="timer-value">0:00</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">SCORE</div>
                <div class="hud-value" id="score-value">0</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">WORDS</div>
                <div class="hud-value" id="found-count-value">0</div>
            </div>
        </div>

        <div class="board-area" id="board-area">
            <div class="grid" id="grid"></div>
            <div class="word-list-panel" id="word-list-panel">
                <div class="title" id="word-list-title">Words Found</div>
                <ul class="word-list" id="found-list"></ul>
                <div class="word-columns hidden" id="word-columns"></div>
            </div>
        </div>

        <div class="word-panel">
            <div class="current-word" id="current-word">&nbsp;</div>
            <div class="status-line" id="status-line">Drag or tap adjacent letters to build a word.</div>
            <div class="controls" id="word-controls">
                <button id="submit-btn">Submit</button>
                <button id="clear-btn">Clear</button>
            </div>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="boggle-shared.js"></script>
    <script>
        // Traditional Boggle scoring.
        function pointsForLength(len) {
            if (len < MIN_WORD_LENGTH) return 0;
            if (len <= 4) return 1;
            if (len === 5) return 2;
            if (len === 6) return 3;
            if (len === 7) return 5;
            return 11;
        }

        // ================= DOM refs =================

        const setupEl = document.getElementById('setup');
        const gameEl = document.getElementById('game');

        const sizeOptionsEl = document.getElementById('size-options');
        const timeOptionsEl = document.getElementById('time-options');
        const startBtn = document.getElementById('start-btn');
        const dictionaryStatusEl = document.getElementById('dictionary-status');

        const endGameBtn = document.getElementById('end-game-btn');
        const newGameBtn = document.getElementById('new-game-btn');

        const gridEl = document.getElementById('grid');
        const timerValueEl = document.getElementById('timer-value');
        const scoreValueEl = document.getElementById('score-value');
        const foundCountValueEl = document.getElementById('found-count-value');
        const currentWordEl = document.getElementById('current-word');
        const statusLineEl = document.getElementById('status-line');
        const wordControlsEl = document.getElementById('word-controls');
        const submitBtn = document.getElementById('submit-btn');
        const clearBtn = document.getElementById('clear-btn');
        const wordListTitleEl = document.getElementById('word-list-title');
        const foundListEl = document.getElementById('found-list');
        const wordColumnsEl = document.getElementById('word-columns');

        // ================= Setup state =================

        const params = new URLSearchParams(window.location.search);
        let boardSize = params.get('size') === '5' ? 5 : 4;
        let timeLimitMinutes = 3;

        function refreshOptionButtons(group, matchAttr, matchValue) {
            group.querySelectorAll('button').forEach(btn => {
                btn.classList.toggle('active', Number(btn.dataset[matchAttr]) === matchValue);
            });
        }

        refreshOptionButtons(sizeOptionsEl, 'size', boardSize);
        refreshOptionButtons(timeOptionsEl, 'minutes', timeLimitMinutes);

        sizeOptionsEl.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            boardSize = Number(btn.dataset.size);
            refreshOptionButtons(sizeOptionsEl, 'size', boardSize);
        });

        timeOptionsEl.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            timeLimitMinutes = Number(btn.dataset.minutes);
            refreshOptionButtons(timeOptionsEl, 'minutes', timeLimitMinutes);
        });

        // ================= Board state =================

        let COLS = 4;
        let ROWS = 4;
        let board = [];
        let neighborsOf = [];
        let WORD_SET = null;
        let TRIE = null;
        let path = [];
        let foundWords = [];
        let score = 0;
        let timeLeftSec = 0;
        let timerInterval = null;
        let gameActive = false;

        function buildBoard(size) {
            const result = buildBoardCells(size);
            board = result.board;
            neighborsOf = result.neighborsOf;
            COLS = result.cols;
            ROWS = result.rows;
        }

        function renderGrid() {
            gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            gridEl.innerHTML = '';
            board.forEach(cell => {
                const dieEl = createDieElement(cell);
                const badge = document.createElement('span');
                badge.className = 'order-badge';
                dieEl.appendChild(badge);
                gridEl.appendChild(dieEl);
            });
        }

        // ================= Path building =================

        function currentWord() {
            return path.map(i => board[i].match).join('');
        }

        // Advances the path by one letter based on the tapped/dragged cell.
        // Returns true if the path changed.
        function stepPath(index, allowRestart) {
            const posInPath = path.indexOf(index);
            if (posInPath !== -1) {
                if (posInPath === path.length - 1) {
                    // Re-arriving at the tail (tapping the last-selected die
                    // again, or a drag that loops back onto it) is a no-op
                    // here -- tapping the tail submits the word instead of
                    // deselecting it, and that's handled by the caller.
                    return false;
                }
                path = path.slice(0, posInPath + 1);
                return true;
            }
            if (path.length === 0) {
                path.push(index);
                return true;
            }
            const last = path[path.length - 1];
            if (neighborsOf[last].includes(index)) {
                path.push(index);
                return true;
            }
            if (allowRestart) {
                // Starting a fresh press on an unconnected cell begins a new word.
                path = [index];
                return true;
            }
            return false;
        }

        function onPathChanged() {
            renderPathHighlight();
            const word = currentWord();
            currentWordEl.textContent = word ? word.toUpperCase() : ' ';
            updateValidityHighlight(word);
            if (word.length === 0) {
                showStatus('Drag or tap adjacent letters to build a word.', 'info');
            }
        }

        // Thickens the selection border when the current selection is a
        // dictionary word that hasn't been found yet -- no new colors needed.
        function updateValidityHighlight(word) {
            const isNewValidWord = word.length >= MIN_WORD_LENGTH
                && WORD_SET.has(word)
                && !foundWords.some(f => f.word === word);
            gridEl.classList.toggle('has-valid-word', isNewValidWord);
        }

        function renderPathHighlight() {
            gridEl.querySelectorAll('.die').forEach(dieEl => {
                const index = Number(dieEl.dataset.index);
                const pos = path.indexOf(index);
                dieEl.classList.toggle('selected', pos !== -1);
                const badge = dieEl.querySelector('.order-badge');
                badge.textContent = pos !== -1 ? String(pos + 1) : '';
            });
        }

        // Resets the selection without touching the status line, so a
        // just-shown submit result (e.g. "+2 points!") isn't immediately
        // overwritten by the idle hint.
        function resetSelection() {
            path = [];
            renderPathHighlight();
            currentWordEl.textContent = ' ';
            updateValidityHighlight('');
        }

        function clearPath() {
            resetSelection();
            showStatus('Drag or tap adjacent letters to build a word.', 'info');
        }

        // ---- Pointer (mouse/touch/pen) handling ----
        // A tap performs a single step (select/deselect/backtrack). A
        // press-and-drag performs a step per letter entered and auto-submits
        // the word on release, matching how Boggle is normally played.

        let pointerActive = false;
        let dragMoved = false;
        let tapOnTail = false;
        let lastRawPos = null;
        let dieCenters = [];
        let dieHitRadius = 0;

        // Caches each die's center point (in viewport coordinates), indexed
        // by cell index, at the start of a drag.
        function cacheDieCenters() {
            dieCenters = new Array(board.length);
            let size = 0;
            gridEl.querySelectorAll('.die').forEach(dieEl => {
                const idx = Number(dieEl.dataset.index);
                const r = dieEl.getBoundingClientRect();
                dieCenters[idx] = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
                size = r.width;
            });
            // Generous relative to a diagonal neighbor's distance (~1.4x a
            // cell's width) since candidates are restricted to nearby cells.
            dieHitRadius = size * 1.6;
        }

        // Finds which nearby cell a point belongs to. Rather than searching
        // every die on the board, this only considers the current path's
        // last cell, that cell's neighbors, and cells already in the path
        // (for backtracking). Restricting the candidate set — instead of
        // picking the single closest die on the whole board — is what makes
        // diagonal drags forgiving: the pointer just needs to be closer to
        // the intended diagonal neighbor than to the last cell itself, not
        // precisely over the die.
        //
        // On a square grid, straight-line distance to a diagonal neighbor
        // and to the two orthogonal neighbors between it and the last cell
        // are exactly equal right at the shared corner -- so any tiny wobble
        // in a hand-drawn diagonal drag (which is never a perfect 45° line)
        // tips the "nearest center" pick toward whichever orthogonal cell
        // the pointer strayed closer to. Discounting diagonal candidates'
        // effective distance biases that whole ambiguous region toward the
        // diagonal cell instead, which is what a diagonal drag almost always
        // means to do.
        const DIAGONAL_BIAS = 0.65;

        function nearestCandidateCell(x, y) {
            if (path.length === 0) return null;
            const lastIndex = path[path.length - 1];
            const lastCell = board[lastIndex];
            const candidates = new Set([lastIndex, ...neighborsOf[lastIndex], ...path]);
            let best = null;
            let bestScore = Infinity;
            candidates.forEach(i => {
                const c = dieCenters[i];
                if (!c) return;
                let dist = Math.hypot(c.x - x, c.y - y);
                const cell = board[i];
                const isDiagonal = Math.abs(cell.row - lastCell.row) === 1
                    && Math.abs(cell.col - lastCell.col) === 1;
                if (isDiagonal) dist *= DIAGONAL_BIAS;
                if (dist < bestScore) {
                    bestScore = dist;
                    best = i;
                }
            });
            if (best === null || bestScore > dieHitRadius) return null;
            return best;
        }

        // Applies one drag step at a raw pointer position, if it lands on a
        // different candidate cell than the current path tail.
        function processDragPoint(x, y) {
            const index = nearestCandidateCell(x, y);
            if (index === null) return;
            // Resolving back to the current tail is a no-op during a drag —
            // stepPath would otherwise treat "re-arrive at the last cell" the
            // same as "tap the last cell again", which deselects it.
            if (path.length && index === path[path.length - 1]) return;
            if (stepPath(index, false)) {
                dragMoved = true;
                onPathChanged();
            }
        }

        gridEl.addEventListener('pointerdown', (e) => {
            if (!gameActive) return;
            const dieEl = e.target.closest('.die');
            if (!dieEl) return;
            pointerActive = true;
            dragMoved = false;
            cacheDieCenters();
            gridEl.setPointerCapture(e.pointerId);
            const index = Number(dieEl.dataset.index);
            // Pressing down on the die that's currently the tail of the
            // path is ambiguous until release: it might be a plain tap
            // (submit the word) or the start of a drag onward to a new
            // letter (extend the word). Leave the path untouched for now --
            // extending is handled by the drag steps below, and a plain tap
            // is resolved in endPointerInteraction.
            tapOnTail = path.length > 0 && path[path.length - 1] === index;
            if (!tapOnTail) {
                stepPath(index, true);
                onPathChanged();
            }
            lastRawPos = { x: e.clientX, y: e.clientY };
        });

        gridEl.addEventListener('pointermove', (e) => {
            if (!gameActive || !pointerActive) return;
            const to = { x: e.clientX, y: e.clientY };
            const from = lastRawPos || to;
            // Browsers coalesce pointermove samples during fast drags, which
            // would otherwise let the pointer "jump over" a cell — most
            // noticeable on diagonals, where cells sit farther apart. Walking
            // the segment between the last and current raw position in small
            // steps ensures every cell it passes through gets processed.
            const dist = Math.hypot(to.x - from.x, to.y - from.y);
            const steps = Math.max(1, Math.ceil(dist / (dieHitRadius / 3 || 20)));
            for (let s = 1; s <= steps; s++) {
                const t = s / steps;
                processDragPoint(from.x + (to.x - from.x) * t, from.y + (to.y - from.y) * t);
            }
            lastRawPos = to;
        });

        function endPointerInteraction() {
            if (!pointerActive) return;
            pointerActive = false;
            lastRawPos = null;
            // A drag submits the (possibly just-extended) word on release.
            // A plain tap that landed on the already-selected tail also
            // submits -- tapping the last letter again finishes the word
            // instead of deselecting it, matching tap-to-build one letter
            // at a time.
            if (gameActive && (dragMoved || tapOnTail)) {
                submitWord();
            }
            dragMoved = false;
            tapOnTail = false;
        }

        gridEl.addEventListener('pointerup', endPointerInteraction);
        gridEl.addEventListener('pointercancel', endPointerInteraction);

        function submitWord() {
            if (!gameActive) return;
            const word = currentWord();
            if (word.length < MIN_WORD_LENGTH) {
                showStatus('Words need at least ' + MIN_WORD_LENGTH + ' letters.', 'info');
                resetSelection();
                return;
            }
            if (foundWords.some(f => f.word === word)) {
                showStatus(word.toUpperCase() + ' — already found.', 'info');
                resetSelection();
                return;
            }
            if (!WORD_SET.has(word)) {
                showStatus(word.toUpperCase() + ' — not a valid word.', 'info');
                resetSelection();
                return;
            }
            const points = pointsForLength(word.length);
            foundWords.push({ word, points });
            score += points;
            showStatus(word.toUpperCase() + ' — +' + points + ' point' + (points === 1 ? '' : 's') + '!', 'success');
            resetSelection();
            renderFoundWords();
            renderScore();
        }

        function showStatus(text, kind) {
            statusLineEl.textContent = text;
            statusLineEl.classList.toggle('success', kind === 'success');
        }

        function renderScore() {
            scoreValueEl.textContent = score;
            foundCountValueEl.textContent = foundWords.length;
        }

        function renderFoundWords() {
            const sorted = sortWords(foundWords.map(f => f.word))
                .map(word => foundWords.find(f => f.word === word));
            foundListEl.innerHTML = '';
            sorted.forEach(f => {
                const li = document.createElement('li');
                li.textContent = f.word.toUpperCase() + ' (' + f.points + ')';
                foundListEl.appendChild(li);
            });
        }

        // ================= Timer =================

        function startTimer(minutes) {
            timeLeftSec = minutes * 60;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeftSec--;
                updateTimerDisplay();
                if (timeLeftSec <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeftSec / 60);
            const s = timeLeftSec % 60;
            timerValueEl.textContent = m + ':' + String(s).padStart(2, '0');
            timerValueEl.classList.toggle('low', timeLeftSec <= 30);
        }

        // ================= Game flow =================

        // Resets the in-game panels back to "playing" mode: the current-word
        // builder and controls are shown, and the word-list panel shows the
        // (empty) found-words list rather than the all-words columns.
        function resetPanelsForPlay() {
            currentWordEl.classList.remove('hidden');
            wordControlsEl.classList.remove('hidden');
            wordListTitleEl.textContent = 'Words Found';
            foundListEl.classList.remove('hidden');
            wordColumnsEl.classList.add('hidden');
            wordColumnsEl.innerHTML = '';
            gridEl.classList.remove('inactive');
            gameEl.classList.remove('with-list');
            document.body.style.overflowY = '';
        }

        function startGame() {
            score = 0;
            foundWords = [];
            path = [];
            buildBoard(boardSize);
            renderGrid();
            renderPathHighlight();
            currentWordEl.textContent = ' ';
            resetPanelsForPlay();
            showStatus('Drag or tap adjacent letters to build a word.', 'info');
            renderFoundWords();
            renderScore();

            setupEl.classList.add('hidden');
            gameEl.classList.remove('hidden');
            endGameBtn.classList.remove('hidden');
            newGameBtn.classList.remove('hidden');
            // Pins the in-game area to the viewport height on narrow screens
            // (see the max-width: 899px rules above) so the found-words list
            // is the only thing that scrolls -- removed again in endGame()/
            // returnToSetup() since the post-game reveal is allowed to grow
            // and scroll the whole page instead.
            document.body.classList.add('in-game');

            gameActive = true;
            startTimer(timeLimitMinutes);
        }

        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            clearInterval(timerInterval);
            document.body.classList.remove('in-game');
            path = [];
            renderPathHighlight();
            gridEl.classList.remove('has-valid-word');
            // Dice do nothing once the game is over, so let a touch drag
            // over the board scroll the page instead of being swallowed.
            gridEl.classList.add('inactive');
            currentWordEl.classList.add('hidden');
            wordControlsEl.classList.add('hidden');
            endGameBtn.classList.add('hidden');
            statusLineEl.innerHTML = '&nbsp;';

            setTimeout(() => {
                // Unhidden (and the board shrunk over) before rendering so
                // renderWordColumns() can measure real, laid-out heights
                // when deciding which lengths need sub-columns.
                wordColumnsEl.classList.remove('hidden');
                foundListEl.classList.add('hidden');
                gameEl.classList.add('with-list');

                const allWordsSet = solveBoard(board, neighborsOf, TRIE);
                const foundSet = new Set(foundWords.map(f => f.word));
                const totalCount = renderWordColumns(wordColumnsEl, allWordsSet, {
                    formatWord: w => w.toUpperCase() + ' (' + pointsForLength(w.length) + ')',
                    foundSet,
                });

                wordListTitleEl.textContent = 'All Possible Words (' + totalCount + ')';
                foundCountValueEl.textContent = foundWords.length + ' / ' + totalCount;
                allowScrollIfContentOverflows();
            }, 20);
        }

        function returnToSetup() {
            gameActive = false;
            clearInterval(timerInterval);
            document.body.classList.remove('in-game');
            resetPanelsForPlay();
            gameEl.classList.add('hidden');
            endGameBtn.classList.add('hidden');
            newGameBtn.classList.add('hidden');
            setupEl.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        endGameBtn.addEventListener('click', endGame);
        newGameBtn.addEventListener('click', returnToSetup);
        submitBtn.addEventListener('click', submitWord);
        clearBtn.addEventListener('click', clearPath);

        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'Enter') {
                submitWord();
            } else if (e.key === 'Escape') {
                clearPath();
            } else if (e.key === 'Backspace') {
                path.pop();
                onPathChanged();
            }
        });

        // Build the dictionary after the setup screen has painted so the
        // "Loading dictionary…" message is visible during the (brief) delay.
        setTimeout(() => {
            const dict = buildDictionary();
            WORD_SET = dict.wordSet;
            TRIE = dict.trie;
            dictionaryStatusEl.textContent = WORD_LIST.length.toLocaleString() + ' words loaded.';
            startBtn.disabled = false;
        }, 20);
    </script>
