<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <link rel="stylesheet" href="shared.css">
    <meta name="theme-color" content="#2c3035">
    <title>Games</title>
    <style>
        .gameList {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 2.4vmin, 28px);
        }

        .gameList p {
            color: var(--bar);
            text-align: center;

        }
    </style>
</head>

<body>

    <div class="heading" id="heading">Games</div>

    <div class="row" id="row"></div>

    <div class="controls">
        <div class="gameList">
            <p>Boggle</p>
            <a href="boggle.html">
                <button>Boggle</button>
            </a>
            <a href="boggle-static.html">
                <button>Boggle (Static)</button>
            </a>
        </div>
        <div class="gameList">
            <p>Yahtzee</p>
            <a href="yahtzee.html">
                <button>Yahtzee</button>
            </a>
            <a href="yahtzee-roller.html">
                <button>Yahtzee Dice Roller</button>
            </a>
        </div>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</body>

</html>
