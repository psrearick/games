<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <meta name="theme-color" content="#2c3035">
    <title>Games</title>
    <style>
        :root {
            --bg: oklch(0.3073 0.0106 253.99);
            --die: oklch(0.3838 0.0143 252.26);
            --die-kept: oklch(from var(--die) calc(l + 0.06) c h);
            --ink: oklch(0.624 0.0035 247.86);
            --bar: oklch(0.5969 0.0442 248.57);
            --die-border: oklch(from var(--die) calc(l - 0.10) c h);
            --die-shadow: oklch(from var(--bg) calc(l - 0.28) c h / 0.25);
            --btn: oklch(from var(--die) calc(l - 0.06) c h);
            --btn-press: oklch(from var(--die) calc(l - 0.14) c h);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            animation: none !important;
            transition: none !important;
        }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(16px, 3vmin, 40px);
            padding: 16px;
            overflow: hidden;
            font-family: 'Lato', 'Open Sans', sans-serif, serif;
        }

        .heading {
            color: var(--bar);
            font-size: clamp(16px, 2.6vmin, 30px);
            font-weight: bold;
            letter-spacing: 0.08em;
            user-select: none;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: clamp(12px, 2.4vmin, 28px);
        }

        button {
            padding: clamp(7px, 1.1vmin, 13px) clamp(18px, 2.8vmin, 34px);
            font-size: clamp(13px, 1.9vmin, 20px);
            font-weight: bold;
            background: var(--btn);
            color: var(--ink);
            border: 2px solid var(--die-border);
            border-radius: clamp(4px, 0.7vmin, 9px);
            cursor: pointer;
            letter-spacing: 0.06em;
        }

        button:active {
            background: var(--btn-press);
        }
    </style>
</head>

<body>

    <div class="heading" id="heading">Games</div>

    <div class="row" id="row"></div>

    <div class="controls">
        <a href="boggle.html">
            <button>Boggle</button>
        </a>
        <a href="yahtzee.html">
            <button>Yatzee</button>
        </a>
        <a href="yahtzee-roller.html">
            <button>Yatzee Dice Roller</button>
        </a>
    </div>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</body>

</html>
